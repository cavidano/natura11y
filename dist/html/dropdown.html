<!DOCTYPE html>

<html lang="en" dir="ltr">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

        <title>Dropdown • Natura11y</title>

        <!-- Natura11y Icons -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/natura11y-icons@v2/dist/natura11y-icons.min.css">

    </head>

    <body>

        <main>

            <section>

                <header class="margin-y-4 text-align-center">
                    <h1 class="banner-headline">Dropdown</h1>
                </header>

                <!-- Standard Dropdown -->

                <div class="container medium margin-x-auto margin-bottom-6 z-index-2000">

                    <ul class="nav nav--divider border nav--horizontal--lg">
                        <li>
                            <button
                                class="dropdown"
                                data-toggle="dropdown"
                                aria-controls="dropdown-standard-1"
                            >
                                <span class="text">Dropdown</span>
                            </button>
                            <ul class="dropdown__menu box-shadow-1--lg" id="dropdown-standard-1">
                                <li><a href="#1">Link</a></li>
                                <li><a href="#1">Link</a></li>
                                <li><a href="#1">Link</a></li>
                            </ul>
                        </li>
                        <li>
                            <div class="dropdown-link-split">
                                <a href="#1" class="text">Split Link</a>
                                <button
                                    data-toggle="dropdown"
                                    aria-controls="dropdown-standard-split"
                                    data-hover="true"
                                ></button>
                            </div>
                            <ul class="dropdown__menu box-shadow-1--lg" id="dropdown-standard-split">
                                <li><a href="#1">Link</a></li>
                                <li><a href="#1">Link</a></li>
                                <li><a href="#1">Link</a></li>
                            </ul>
                        </li>
                        <li><a href="#1">Link</a></li>
                    </ul>

                </div>

            </section>

        </main>

    </body>

</html>
