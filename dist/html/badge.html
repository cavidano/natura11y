<!DOCTYPE html>

<html lang="en" dir="ltr">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

        <title>Badge • Natura11y</title>

        <!-- Natura11y Icons -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/natura11y-icons@v2/dist/natura11y-icons.min.css">

    </head>

    <body>

        <main>

            <section>

                <header class="margin-y-4 text-align-center">
                    <h1 class="banner-headline">Badge</h1>
                </header>

                <div class="container narrow margin-y-5 grid gap-3">

                    <ul class="nav nav--horizontal">
                        <li>
                            <span class="badge">Default</span>
                        </li>
                        <li>
                            <span class="badge theme-primary">Primary</span>
                        </li>
                        <li>
                            <span class="badge theme-secondary">Secondary</span>
                        </li>
                        <li>
                            <span class="badge theme-dark">Dark</span>
                        </li>
                    </ul>

                    <ul class="nav nav--horizontal">
                        <li>
                            <span class="badge">
                                <span class="icon icon-bell" aria-hidden="true"></span>
                                Default
                            </span>
                        </li>
                        <li>
                            <span class="badge theme-primary">
                                <span class="icon icon-bell" aria-hidden="true"></span>
                                Primary
                            </span>
                        </li>
                        <li>
                            <span class="badge theme-secondary">
                                <span class="icon icon-bell" aria-hidden="true"></span>
                                Secondary
                            </span>
                        </li>
                        <li>
                            <span class="badge theme-dark">
                                <span class="icon icon-bell" aria-hidden="true"></span>
                                Dark
                            </span>
                        </li>
                    </ul>

                    <ul class="nav nav--horizontal">
                        <li>
                            <a class="badge" href="#1">
                                <span class="icon icon-bell" aria-hidden="true"></span>
                                Default
                            </a>
                        </li>
                        <li>
                            <a class="badge theme-primary" href="#1">
                                <span class="icon icon-bell" aria-hidden="true"></span>
                                Primary
                            </a>
                        </li>
                        <li>
                            <a class="badge theme-secondary" href="#1">
                                <span class="icon icon-bell" aria-hidden="true"></span>
                                Secondary
                            </a>
                        </li>
                        <li>
                            <a class="badge theme-dark" href="#1">
                                <span class="icon icon-bell" aria-hidden="true"></span>
                                Dark
                            </a>
                        </li>
                    </ul>

                </div>

                <div class="container narrow margin-y-5">

                    <ul class="nav nav--divider border">
                        <li>
                            <a href="#1">
                                Home
                            </a>
                        </li>
                        <li>
                            <a href="#1">
                                Inbox
                                <span class="badge theme-primary">
                                    12
                                </span>
                            </a>
                        </li>
                        <li>
                            <a href="#1">
                                Archive
                            </a>
                        </li>
                        <li>
                            <a href="#1">
                                Notifications
                                <span class="badge theme-secondary">
                                    3
                                </span>
                            </a>
                        </li>
                    </ul>

                </div>


            </section>

        </main>

    </body>

</html>
