<!DOCTYPE html>

<html lang="en" dir="ltr">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

        <title>Pagination • Natura11y</title>

        <!-- Natura11y Icons -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/natura11y-icons@v2/dist/natura11y-icons.min.css">

    </head>

    <body>

        <main>

            <section>

                <header class="margin-y-4 text-align-center">
                    <h1 class="banner-headline">Pagination</h1>
                </header>

                <div class="container narrow margin-y-5">

                    <nav aria-label="Pagination">
                        <ul class="nav-pagination">
                            <li>
                                <a href="#1" aria-label="Previous page">
                                    <span class="icon icon-arrow-left" aria-hidden="true"></span>
                                </a>
                            </li>
                            <li>
                                <a href="#1">1</a>
                            </li>
                            <li>
                                <a href="#2" aria-current="page">2</a>
                            </li>
                            <li>
                                <a href="#3">3</a>
                            </li>
                            <li aria-hidden="true">
                                <span>…</span>
                            </li>
                            <li>
                                <a href="#10">10</a>
                            </li>
                            <li>
                                <a href="#3" aria-label="Next page">
                                    <span class="icon icon-arrow-right" aria-hidden="true"></span>
                                </a>
                            </li>
                        </ul>
                    </nav>

                    <nav aria-label="Pagination">

                        <ul class="nav-pagination">
                            <li>
                                <a href="#1">
                                    <span class="icon icon-arrow-left" aria-hidden="true"></span>
                                    <span class="text">Previous</span>
                                </a>
                            </li>
                            <li>
                                <a href="#1">1</a>
                            </li>
                            <li>
                                <a href="#2" aria-current="page">2</a>
                            </li>
                            <li>
                                <a href="#3">3</a>
                            </li>
                            <li aria-hidden="true">
                                <span>…</span>
                            </li>
                            <li>
                                <a href="#10">10</a>
                            </li>
                            <li>
                                <a href="#3">
                                    <span class="text">Next</span>
                                    <span class="icon icon-arrow-right" aria-hidden="true"></span>
                                </a>
                            </li>
                        </ul>
                        
                    </nav>

                </div>

            </section>

        </main>

    </body>

</html>
