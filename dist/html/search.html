<!DOCTYPE html>

<html lang="en" dir="ltr">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

        <title>Search • Natura11y</title>

        <!-- Natura11y Icons -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/natura11y-icons@v2/dist/natura11y-icons.min.css">

    </head>

    <body>

        <main>

            <section>

                <header class="margin-y-4 text-align-center">
                    <h1 class="banner-headline">Search</h1>
                </header>

                <div class="container narrow margin-y-5 grid gap-5 font-size-lg">

                    <!-- Icon variant: search icon + input + clear button -->

                    <div class="form-entry form-entry--search">
                        <div class="form-entry__field">
                            <span class="form-entry__field__input">
                                <span class="icon icon-search opacity-50" aria-hidden="true"></span>
                                <input
                                    type="search"
                                    placeholder="Search..."
                                    aria-label="Search"
                                    id="search-icon" />
                                <button
                                    type="button"
                                    class="button button--icon-only"
                                    data-search-clear
                                    aria-label="Clear search"
                                    aria-controls="search-icon">
                                    <span class="icon icon-clear" aria-hidden="true"></span>
                                </button>
                            </span>
                        </div>
                    </div>

                    <!-- Button variant: search icon + input + clear button + "Search" text button -->

                    <div class="form-entry form-entry--search">
                        <div class="form-entry__field">
                            <span class="form-entry__field__input">
                                <span class="icon icon-search opacity-50" aria-hidden="true"></span>
                                <input
                                    type="search"
                                    placeholder="Search..."
                                    aria-label="Search"
                                    id="search-button" />
                                <button
                                    type="button"
                                    class="button button--icon-only"
                                    data-search-clear
                                    aria-label="Clear search"
                                    aria-controls="search-button">
                                    <span class="icon icon-clear" aria-hidden="true"></span>
                                </button>
                                <button type="button" class="button theme-primary">
                                    Search
                                </button>
                            </span>
                        </div>
                    </div>

                    <!-- Icon-only search button: input + clear + icon search button -->

                    <div class="form-entry form-entry--search">
                        <div class="form-entry__field">
                            <span class="form-entry__field__input">
                                <input
                                    type="search"
                                    placeholder="Search..."
                                    aria-label="Search"
                                    id="search-icon-button" />
                                <button
                                    type="button"
                                    class="button button--icon-only"
                                    data-search-clear
                                    aria-label="Clear search"
                                    aria-controls="search-icon-button">
                                    <span class="icon icon-clear" aria-hidden="true"></span>
                                </button>
                                <button type="button" class="button button--icon-only theme-primary" aria-label="Search">
                                    <span class="icon icon-search" aria-hidden="true"></span>
                                </button>
                            </span>
                        </div>
                    </div>

                    <!-- Pre-populated variant: simulates a search results page -->

                    <div class="form-entry form-entry--search">
                        <div class="form-entry__field">
                            <span class="form-entry__field__input">
                                <span class="icon icon-search opacity-50" aria-hidden="true"></span>
                                <input
                                    type="search"
                                    placeholder="Search..."
                                    aria-label="Search"
                                    id="search-results"
                                    value="Monarch butterfly" />
                                <button
                                    type="button"
                                    class="button button--icon-only"
                                    data-search-clear
                                    aria-label="Clear search"
                                    aria-controls="search-results">
                                    <span class="icon icon-clear" aria-hidden="true"></span>
                                </button>
                                <button type="button" class="button button--icon-only theme-primary" aria-label="Search">
                                    <span class="icon icon-search" aria-hidden="true"></span>
                                </button>
                            </span>
                        </div>
                    </div>

                </div>

                <!-- Main menu context -->

                <div class="wide margin-x-auto margin-y-5 z-index-1500">

                    <div class="main-menu--bar--lg box-shadow-1">

                        <div class="main-menu__logo">
                            <a href="#1" title="Home" data-logo="brand">
                                <svg xmlns="http://www.w3.org/2000/svg" width="126" height="34" viewBox="0 0 126 34">
                                    <g>
                                        <polygon points="8 25 8 1 0 1 0 33 3 33 8 33 16 33 16 25 8 25"/>
                                        <path d="M35,0A17,17,0,1,0,52,17,17,17,0,0,0,35,0Zm0,26a9,9,0,1,1,9-9A9,9,0,0,1,35,26Z"/>
                                        <path d="M109,0a17,17,0,1,0,17,17A17,17,0,0,0,109,0Zm0,26a9,9,0,1,1,9-9A9,9,0,0,1,109,26Z"/>
                                        <path d="M88.95,16H72v6h7.4824a9,9,0,1,1,0-10H88.25A17.0052,17.0052,0,1,0,89,17C89,16.6624,88.9689,16.3327,88.95,16Z"/>
                                    </g>
                                </svg>
                            </a>
                        </div>

                        <nav class="main-menu__nav" id="search-page-menu-bar" aria-label="Main Menu">
                            <ul>
                                <li><a href="#1">Link</a></li>
                                <li><a href="#1">Link</a></li>
                                <li><a href="#1">Link</a></li>
                            </ul>
                        </nav>

                        <div class="main-menu__toggle">
                            <button
                                class="button button--icon-only"
                                aria-label="Menu"
                                data-toggle="collapse"
                                aria-controls="search-page-menu-bar"
                                data-target-close="search-page-menu-search"
                                aria-expanded="false"
                            >
                                <span class="icon icon-menu"></span>
                            </button>
                            <button
                                class="button button--icon-only"
                                aria-label="Search"
                                data-toggle="collapse"
                                aria-controls="search-page-menu-search"
                                data-target-close="search-page-menu-bar"
                                aria-expanded="false"
                            >
                                <span class="icon icon-search"></span>
                            </button>
                        </div>

                        <form class="main-menu__search" role="search" id="search-page-menu-search" data-focus-first>
                            <div class="form-entry form-entry--search">
                                <div class="form-entry__field">
                                    <span class="form-entry__field__input">
                                        <input
                                            type="search"
                                            name="search"
                                            aria-label="Search"
                                            id="search-page-menu-search-input" />
                                        <button
                                            type="button"
                                            class="button button--icon-only"
                                            data-search-clear
                                            aria-label="Clear search"
                                            aria-controls="search-page-menu-search-input">
                                            <span class="icon icon-clear" aria-hidden="true"></span>
                                        </button>
                                        <button type="submit" class="button theme-primary">
                                            Search
                                        </button>
                                    </span>
                                </div>
                            </div>
                        </form>

                    </div>

                </div>

            </section>

        </main>

    </body>

</html>
